<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ألو جيتك</title>

<script>

const android =
"https://play.google.com/store/apps/details?id=com.alojetak.app";

const ios =
"https://apps.apple.com/il/app/%D8%A3%D9%84%D9%88-%D8%AC%D9%8A%D8%AA%D9%83/id6756861614";

const ua = navigator.userAgent || navigator.vendor || window.opera;

if (/android/i.test(ua)) {

    window.location.href = android;

} else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {

    window.location.href = ios;

} else {

    window.location.href = android;

}

</script>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.box{
    text-align:center;
}

.loader{
    width:60px;
    height:60px;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid white;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="box">
    <h1>ألو جيتك</h1>
    <p>جاري التحويل...</p>
    <div class="loader"></div>
</div>

</body>
</html>
