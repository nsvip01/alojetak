<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ألو جيتك</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.card{
    width:90%;
    max-width:420px;
    padding:40px 30px;
    border-radius:24px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.logo{
    width:100px;
    height:100px;
    border-radius:22px;
    margin-bottom:20px;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:30px;
}

.loader{
    width:60px;
    height:60px;
    border:5px solid rgba(255,255,255,.15);
    border-top:5px solid white;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

</style>

</head>

<body>

<div class="card">

    <!-- ضع شعار التطبيق -->
    <img
        class="logo"
        src="https://via.placeholder.com/100"
        alt="Alo Jetak"
    >

    <h1>ألو جيتك</h1>

    <p>
        جاري تحويلك إلى متجر التطبيق المناسب...
    </p>

    <div class="loader"></div>

</div>

<script>

const ANDROID_URL =
"https://play.google.com/store/apps/details?id=com.alojetak.app";

const IOS_URL =
"https://apps.apple.com/il/app/%D8%A3%D9%84%D9%88-%D8%AC%D9%8A%D8%AA%D9%83/id6756861614";

const ua = navigator.userAgent || navigator.vendor || window.opera;

setTimeout(() => {

    if (/android/i.test(ua)) {

        window.location.href = ANDROID_URL;

    } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {

        window.location.href = IOS_URL;

    } else {

        window.location.href = ANDROID_URL;

    }

}, 1200);

</script>

</body>
</html>
