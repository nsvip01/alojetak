<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ألو جيتك</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Cairo',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
    radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a,#111827);

    color:white;
}

/* الخلفية المتحركة */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.bg span{
    position:absolute;
    display:block;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    animation:float 15s linear infinite;
    bottom:-150px;
}

.bg span:nth-child(1){
    width:120px;
    height:120px;
    left:10%;
    animation-duration:18s;
}

.bg span:nth-child(2){
    width:80px;
    height:80px;
    left:30%;
    animation-duration:12s;
}

.bg span:nth-child(3){
    width:150px;
    height:150px;
    left:55%;
    animation-duration:22s;
}

.bg span:nth-child(4){
    width:60px;
    height:60px;
    left:75%;
    animation-duration:10s;
}

.bg span:nth-child(5){
    width:100px;
    height:100px;
    left:90%;
    animation-duration:17s;
}

@keyframes float{

    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }

}

/* الكارد */

.card{

    position:relative;
    z-index:2;

    width:90%;
    max-width:430px;

    padding:45px 35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.12);

    text-align:center;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35),
    inset 0 0 0 1px rgba(255,255,255,.05);

    animation:fadeUp 1s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* اللوغو */

.logo-wrap{

    width:130px;
    height:130px;

    margin:auto auto 25px;

    border-radius:32px;

    padding:6px;

    background:linear-gradient(135deg,#38bdf8,#2563eb);

    animation:pulse 2.5s infinite;
}

.logo{

    width:100%;
    height:100%;

    border-radius:28px;

    object-fit:cover;

    background:white;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(56,189,248,.4);
    }

    50%{
        transform:scale(1.04);
        box-shadow:0 0 35px rgba(56,189,248,.4);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(56,189,248,.1);
    }

}

h1{

    font-size:34px;
    font-weight:700;
    margin-bottom:10px;
}

p{

    opacity:.8;
    line-height:1.9;
    font-size:15px;

    margin-bottom:35px;
}

/* اللودر */

.loader{

    width:65px;
    height:65px;

    margin:auto;

    border-radius:50%;

    border:5px solid rgba(255,255,255,.1);
    border-top:5px solid #38bdf8;

    animation:spin 1s linear infinite;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

.status{

    margin-top:22px;
    font-size:14px;
    opacity:.7;
    animation:blink 1.5s infinite;
}

@keyframes blink{

    50%{
        opacity:.35;
    }

}

</style>

</head>

<body>

<div class="bg">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="card">

    <div class="logo-wrap">

        <img
            class="logo"
            src="https://play-lh.googleusercontent.com/SjOgH3f1c7H2HKbG5xdKhnVwBtHud3EtvOp3h51vhlXZkn8y0CeQElhUUGja6SC02ZhQ4aaN95NJubWa4yDqUg=w240-h480-rw"
            alt="ألو جيتك"
        >

    </div>

    <h1>ألو جيتك</h1>

    <p>
        جاري تحويلك إلى متجر التطبيق المناسب لجهازك...
    </p>

    <div class="loader"></div>

    <div class="status">
        يرجى الانتظار قليلاً
    </div>

</div>

<script>

const ANDROID_URL =
"https://play.google.com/store/apps/details?id=com.alojetak.app";

const IOS_URL =
"https://apps.apple.com/il/app/%D8%A3%D9%84%D9%88-%D8%AC%D9%8A%D8%AA%D9%83/id6756861614";

const ua = navigator.userAgent || navigator.vendor || window.opera;

setTimeout(() => {

    if (/android/i.test(ua)) {

        window.location.href = ANDROID_URL;

    } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {

        window.location.href = IOS_URL;

    } else {

        window.location.href = ANDROID_URL;

    }

}, 2200);

</script>

</body>
</html>
